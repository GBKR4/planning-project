server {
    server_name gbkr.tech www.gbkr.tech;

    root /var/www/html;
    index index.html;

    # SPA: serve index.html for all routes — no caching on HTML itself
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires 0;
    }

    location /api/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS headers
        add_header 'Access-Control-Allow-Origin' 'https://gbkr.tech' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;

        # Handle preflight request
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Hashed assets: long-lived cache (safe because filenames change on rebuild)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /uploads/ {
        proxy_pass http://localhost:5000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/gbkr.tech/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/gbkr.tech/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = gbkr.tech) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name gbkr.tech www.gbkr.tech;
    return 404; # managed by Certbot
}
